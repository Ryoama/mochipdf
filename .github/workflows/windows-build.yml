name: Build Windows

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Needed so softprops/action-gh-release can upload assets to the GitHub Release
# created for the v* tag. Default GITHUB_TOKEN is read-only, which causes the
# upload step to 403.
permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (executable only — installers disabled)
        run: npm run tauri:build -- --target x86_64-pc-windows-msvc --no-bundle --verbose

      - name: List build outputs
        if: always()
        shell: pwsh
        run: |
          $base = "src-tauri/target/x86_64-pc-windows-msvc/release"
          if (Test-Path $base) {
            Write-Host "=== $base ==="
            Get-ChildItem $base -File | Format-Table Name, Length
            if (Test-Path "$base/bundle") {
              Write-Host "=== $base/bundle ==="
              Get-ChildItem "$base/bundle" -Recurse -File | Select-Object FullName, Length | Format-Table -AutoSize
            }
          } else {
            Write-Host "Build output dir does not exist: $base"
          }

      - name: Package portable zip
        if: success()
        shell: pwsh
        run: |
          $release = "src-tauri/target/x86_64-pc-windows-msvc/release"
          $exe = Join-Path $release "MochiPDF.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Built exe not found: $exe"
            Get-ChildItem $release -File | Format-Table Name
            exit 1
          }
          $stage = "MochiPDF-portable"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item $exe (Join-Path $stage "MochiPDF.exe")
          $zip = "MochiPDF-windows-portable.zip"
          if (Test-Path $zip) { Remove-Item $zip }
          Compress-Archive -Path "$stage\*" -DestinationPath $zip
          Write-Host "Portable zip: $zip"
          Get-Item $zip | Select-Object Name, Length | Format-Table -AutoSize

      - name: Stage stable-named release artifact
        if: success()
        shell: pwsh
        run: |
          $stage = "release-stage"
          if (Test-Path $stage) { Remove-Item -Recurse -Force $stage }
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          if (-not (Test-Path "MochiPDF-windows-portable.zip")) {
            Write-Error "Portable zip missing"
            exit 1
          }
          Copy-Item "MochiPDF-windows-portable.zip" (Join-Path $stage "MochiPDF-windows-portable.zip")
          Get-ChildItem $stage | Select-Object Name, Length | Format-Table -AutoSize

      - name: Upload self-contained portable zip artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MochiPDF-windows-portable
          path: release-stage/MochiPDF-windows-portable.zip
          if-no-files-found: error

      - name: Attach to versioned GitHub Release (tags)
        if: success() && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release-stage/*
          draft: false
          fail_on_unmatched_files: false

      - name: Update rolling "latest" prerelease (main)
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build (main)
          body: |
            Rolling build from the latest commit on `main` (${{ github.sha }}).
            For stable releases, see the versioned `v*` tags.
          prerelease: true
          files: release-stage/*
          fail_on_unmatched_files: false
