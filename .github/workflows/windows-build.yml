name: Build Windows

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (MSI + NSIS)
        run: npm run tauri:build -- --target x86_64-pc-windows-msvc -b msi -b nsis --verbose

      - name: List build outputs
        if: always()
        shell: pwsh
        run: |
          $base = "src-tauri/target/x86_64-pc-windows-msvc/release"
          if (Test-Path $base) {
            Write-Host "=== $base ==="
            Get-ChildItem $base -File | Format-Table Name, Length
            if (Test-Path "$base/bundle") {
              Write-Host "=== $base/bundle ==="
              Get-ChildItem "$base/bundle" -Recurse -File | Select-Object FullName, Length | Format-Table -AutoSize
            }
          } else {
            Write-Host "Build output dir does not exist: $base"
          }

      - name: Upload MSI artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MochiPDF-windows-msi
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload NSIS installer artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MochiPDF-windows-nsis
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload portable exe artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MochiPDF-windows-portable
          path: src-tauri/target/x86_64-pc-windows-msvc/release/mochi-pdf.exe
          if-no-files-found: warn

      - name: Attach to GitHub Release
        if: success() && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/mochi-pdf.exe
          draft: true
          fail_on_unmatched_files: false
