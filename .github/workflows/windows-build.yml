name: Build Windows

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  WEBVIEW2_VERSION: "133.0.3065.92"

# Needed so softprops/action-gh-release can upload assets to the GitHub Release
# created for the v* tag. Default GITHUB_TOKEN is read-only, which causes the
# upload step to 403.
permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Download WebView2 Fixed Version Runtime
        shell: pwsh
        run: |
          $ver = "${env:WEBVIEW2_VERSION}"
          $cab = "src-tauri/webview2.cab"
          $dest = "src-tauri/Microsoft.WebView2.FixedVersionRuntime.$ver.x64"
          $url = "https://github.com/westinyang/WebView2RuntimeArchive/releases/download/$ver/Microsoft.WebView2.FixedVersionRuntime.$ver.x64.cab"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $cab -UseBasicParsing
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          expand $cab -F:* $dest | Out-Null
          $nested = Join-Path $dest "Microsoft.WebView2.FixedVersionRuntime.$ver.x64"
          if (Test-Path $nested) {
            Get-ChildItem $nested -Force | Move-Item -Destination $dest
            Remove-Item -Recurse -Force $nested
          }
          if (-not (Test-Path (Join-Path $dest "msedgewebview2.exe"))) {
            Write-Error "Extraction failed: msedgewebview2.exe not found in $dest"
            Get-ChildItem -Recurse $dest | Select-Object FullName | Format-Table -AutoSize
            exit 1
          }
          Write-Host "Extracted runtime files (top level):"
          Get-ChildItem $dest | Select-Object Name, Length | Format-Table -AutoSize

      - name: Build Tauri app (executable only — installers disabled)
        run: npm run tauri:build -- --target x86_64-pc-windows-msvc --no-bundle --verbose

      - name: List build outputs
        if: always()
        shell: pwsh
        run: |
          $base = "src-tauri/target/x86_64-pc-windows-msvc/release"
          if (Test-Path $base) {
            Write-Host "=== $base ==="
            Get-ChildItem $base -File | Format-Table Name, Length
            if (Test-Path "$base/bundle") {
              Write-Host "=== $base/bundle ==="
              Get-ChildItem "$base/bundle" -Recurse -File | Select-Object FullName, Length | Format-Table -AutoSize
            }
          } else {
            Write-Host "Build output dir does not exist: $base"
          }

      - name: Package self-contained portable zip
        if: success()
        shell: pwsh
        run: |
          $ver = "${env:WEBVIEW2_VERSION}"
          $release = "src-tauri/target/x86_64-pc-windows-msvc/release"
          $exe = Join-Path $release "MochiPDF.exe"
          $runtime = "src-tauri/Microsoft.WebView2.FixedVersionRuntime.$ver.x64"
          if (-not (Test-Path $exe)) {
            Write-Error "Built exe not found: $exe"
            Get-ChildItem $release -File | Format-Table Name
            exit 1
          }
          $stage = "MochiPDF-portable"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item $exe (Join-Path $stage "MochiPDF.exe")
          Copy-Item -Recurse $runtime (Join-Path $stage "Microsoft.WebView2.FixedVersionRuntime.$ver.x64")
          $zip = "MochiPDF-windows-portable.zip"
          if (Test-Path $zip) { Remove-Item $zip }
          Compress-Archive -Path "$stage\*" -DestinationPath $zip
          Write-Host "Portable zip: $zip"
          Get-Item $zip | Select-Object Name, Length | Format-Table -AutoSize

      - name: Stage stable-named release artifact
        if: success()
        shell: pwsh
        run: |
          $stage = "release-stage"
          if (Test-Path $stage) { Remove-Item -Recurse -Force $stage }
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          if (-not (Test-Path "MochiPDF-windows-portable.zip")) {
            Write-Error "Portable zip missing"
            exit 1
          }
          Copy-Item "MochiPDF-windows-portable.zip" (Join-Path $stage "MochiPDF-windows-portable.zip")
          Get-ChildItem $stage | Select-Object Name, Length | Format-Table -AutoSize

      - name: Upload self-contained portable zip artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MochiPDF-windows-portable
          path: release-stage/MochiPDF-windows-portable.zip
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: success() && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release-stage/*
          draft: false
          fail_on_unmatched_files: false
