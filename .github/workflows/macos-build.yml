name: Build macOS

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Needed so softprops/action-gh-release can upload assets to the GitHub Release
# created for the v* tag. Default GITHUB_TOKEN is read-only, which causes the
# upload step to 403.
permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust (aarch64-apple-darwin)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (.app + .dmg)
        run: npm run tauri:build -- --target aarch64-apple-darwin --verbose

      - name: List build outputs
        if: always()
        shell: bash
        run: |
          base="src-tauri/target/aarch64-apple-darwin/release"
          if [ -d "$base/bundle" ]; then
            echo "=== $base/bundle ==="
            find "$base/bundle" -type f -print0 \
              | xargs -0 -I{} sh -c 'printf "%s  %s bytes\n" "{}" "$(wc -c <"{}")"'
          else
            echo "Bundle dir missing: $base/bundle"
            ls -R "src-tauri/target" 2>/dev/null | head -200 || true
          fi

      - name: Ad-hoc sign .app and stage repacked DMG
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          base="src-tauri/target/aarch64-apple-darwin/release"
          app="$base/bundle/macos/MochiPDF.app"
          if [ ! -d "$app" ]; then
            echo "::error::App bundle not found at $app"
            find src-tauri/target -type d -name '*.app' 2>/dev/null || true
            exit 1
          fi

          echo "=== Ad-hoc codesign .app (deep) ==="
          codesign --force --deep --sign - "$app"
          codesign -dv "$app" 2>&1 | sed 's/^/  /'
          codesign --verify --verbose=2 "$app" 2>&1 | sed 's/^/  /'

          echo "=== Repack DMG with signed .app ==="
          stage="release-stage"
          rm -rf "$stage" && mkdir -p "$stage"
          work=$(mktemp -d)
          cp -R "$app" "$work/"
          ln -s /Applications "$work/Applications"
          hdiutil create -volname "MochiPDF" -srcfolder "$work" \
            -ov -format UDZO "$stage/MochiPDF-mac.dmg"
          ls -la "$stage"

      - name: Upload .dmg artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MochiPDF-mac-dmg
          path: release-stage/MochiPDF-mac.dmg
          if-no-files-found: error

      - name: Attach to GitHub Release
        # Normally this runs only for v* tag pushes. The proxy used in
        # development blocks tag pushes, so we temporarily also attach
        # whenever the build on the deploy branch succeeds, targeting the
        # already-published v0.1.0 release. Revert to the tag-only gate
        # once the v0.1.0 assets are in place.
        if: success() && (startsWith(github.ref, 'refs/tags/v') || github.head_ref == 'claude/deploy-vercel-github-3dsUE')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0
          files: release-stage/*
          draft: false
          fail_on_unmatched_files: false
