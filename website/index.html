<style>
:root{
  --y-main:#FFD766;
  --y-accent:#FF8800;
  --w-mochi:#FFF7E6;
  --beige:#F6EFE3;
  --beige-2:#EFE6D5;
  --charcoal:#333333;
  --ink:#2A2620;
  --muted:#736B5E;
  --hairline:#E8E0CF;
  --pink:#F8C8C0;
  --green:#9DD9A8;
  --red:#E8847A;
  --shadow-soft: 0 12px 40px -16px rgba(80,55,10,.18);
  --shadow-card: 0 1px 0 rgba(0,0,0,0.02), 0 8px 24px -12px rgba(80,55,10,.12);
  --radius-card:20px;
  --radius-pill:999px;
  --radius-sm:12px;
  --serif: "Zen Maru Gothic","Zen Kaku Gothic New",-apple-system,BlinkMacSystemFont,sans-serif;
  --sans: "Inter","Zen Kaku Gothic New",-apple-system,BlinkMacSystemFont,sans-serif;
  --mono: "JetBrains Mono",ui-monospace,Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--w-mochi);color:var(--ink);font-family:var(--serif);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{min-height:100vh;line-height:1.6;font-feature-settings:"palt"}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
::selection{background:var(--y-main);color:var(--ink)}

/* Subtle dotted texture */
body{
  background-image:
    radial-gradient(circle at 20% 10%, rgba(255,215,102,.18) 0, transparent 35%),
    radial-gradient(circle at 90% 60%, rgba(255,215,102,.12) 0, transparent 40%),
    radial-gradient(rgba(80,55,10,.04) 1px, transparent 1px);
  background-size: auto, auto, 22px 22px;
  background-position: 0 0, 0 0, 0 0;
}

/* ------- Layout helpers ------- */
.container{max-width:1200px;margin:0 auto;padding:0 24px}
.container-wide{max-width:1320px;margin:0 auto;padding:0 24px}
.section{padding:96px 0}
.section-tight{padding:64px 0}
.eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:.16em;
  text-transform:uppercase;color:var(--y-accent);
  background:#FFF1D1;border:1px solid #FFE3A1;border-radius:999px;
  padding:6px 12px;
}
.eyebrow .num{
  font-family:var(--mono);background:var(--y-accent);color:#fff;
  width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
}
h1,h2,h3,h4{font-family:var(--serif);color:var(--ink);font-weight:700;line-height:1.25;letter-spacing:-.005em}
h2.section-title{font-size:44px;font-weight:700;margin-top:14px}
h2.section-title .accent{color:var(--y-accent)}
.section-sub{color:var(--muted);font-size:17px;margin-top:12px;max-width:620px}

.btn{
  display:inline-flex;align-items:center;gap:10px;
  font-family:var(--sans);font-weight:600;font-size:15px;
  padding:14px 22px;border-radius:var(--radius-pill);
  border:1.5px solid transparent;transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
}
.btn-primary{
  background:var(--y-accent);color:#fff;
  box-shadow: 0 8px 22px -10px rgba(255,136,0,.55), inset 0 -2px 0 rgba(0,0,0,.08);
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 26px -10px rgba(255,136,0,.65), inset 0 -2px 0 rgba(0,0,0,.08)}
.btn-secondary{background:#fff;color:var(--ink);border-color:var(--hairline)}
.btn-secondary:hover{border-color:var(--y-accent);color:var(--y-accent)}
.btn-ghost{color:var(--ink);padding:10px 14px}
.btn-ghost:hover{color:var(--y-accent)}

/* ------- Header ------- */
.site-header{
  position:sticky;top:0;z-index:50;
  backdrop-filter:saturate(1.2) blur(10px);
  background:rgba(255,247,230,.78);
  border-bottom:1px solid rgba(232,224,207,.6);
}
.site-header .row{display:flex;align-items:center;justify-content:space-between;height:68px}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:20px}
.brand img{width:36px;height:36px}
.nav{display:flex;gap:6px}
.nav a{padding:8px 14px;border-radius:999px;font-size:14px;color:var(--muted);font-weight:500;font-family:var(--sans)}
.nav a:hover{background:#fff;color:var(--ink)}
.header-cta{display:flex;align-items:center;gap:8px}
.lang-switch{display:flex;background:#fff;border:1px solid var(--hairline);border-radius:999px;padding:3px;font-family:var(--sans);font-size:12px;font-weight:600}
.lang-switch button{padding:6px 12px;border-radius:999px;color:var(--muted)}
.lang-switch button.on{background:var(--ink);color:#fff}

/* ------- Hero ------- */
.hero{position:relative;overflow:hidden}
.hero-inner{display:grid;grid-template-columns:1.05fr .95fr;gap:60px;align-items:center;padding:80px 0 100px}
.hero-inner > *{min-width:0}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:10px;
  font-family:var(--sans);font-size:13px;font-weight:600;
  background:#fff;border:1px solid var(--hairline);
  border-radius:999px;padding:6px 14px 6px 6px;color:var(--muted);
}
.hero-eyebrow .dot{width:24px;height:24px;border-radius:50%;background:var(--y-main);display:inline-flex;align-items:center;justify-content:center;font-size:13px}
.hero h1{font-size:clamp(44px, 6vw, 76px);line-height:1.08;font-weight:700;margin-top:18px;letter-spacing:-.02em}
.hero h1 .y{
  background:linear-gradient(180deg, transparent 60%, var(--y-main) 60%, var(--y-main) 92%, transparent 92%);
  padding:0 .08em;
}
.hero h1 .stamp{
  display:inline-block;color:var(--y-accent);position:relative;
}
.hero p.lede{font-size:19px;color:var(--muted);margin-top:22px;max-width:520px}
.hero .cta{display:flex;flex-wrap:wrap;gap:12px;margin-top:32px}
.hero .meta{display:flex;flex-wrap:wrap;gap:18px;margin-top:24px;font-family:var(--sans);font-size:13px;color:var(--muted)}
.hero .meta span{display:inline-flex;align-items:center;gap:6px}
.hero .meta .ck{color:var(--y-accent);font-weight:700}

.hero-art{position:relative;display:flex;align-items:center;justify-content:center;min-height:480px}
.hero-mascot{position:relative;z-index:2;width:min(440px,90%)}
.hero-mascot img{filter: drop-shadow(0 30px 50px rgba(80,55,10,.18))}
.hero-blob{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:1;
}
.hero-blob::before{
  content:"";width:520px;height:520px;border-radius:50%;
  background: radial-gradient(closest-side, #FFE9A6 0%, #FFE9A6 55%, transparent 70%);
  filter: blur(10px);
}

/* Floating chips around mascot */
.chip{
  position:absolute;background:#fff;border:1px solid var(--hairline);
  border-radius:14px;padding:10px 14px;font-family:var(--sans);font-size:13px;font-weight:600;
  box-shadow: var(--shadow-card);display:flex;align-items:center;gap:10px;z-index:3;
}
.chip .ic{
  width:28px;height:28px;border-radius:8px;background:var(--w-mochi);
  display:flex;align-items:center;justify-content:center;color:var(--y-accent);
}
.chip.c1{top:10%;left:-2%;animation:floaty 6s ease-in-out infinite}
.chip.c2{top:18%;right:-4%;animation:floaty 7.5s ease-in-out infinite -1s}
.chip.c3{bottom:14%;left:3%;animation:floaty 7s ease-in-out infinite -2s}
.chip.c4{bottom:8%;right:0%;animation:floaty 6.5s ease-in-out infinite -.5s}
@keyframes floaty{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}

/* Hero variant 2: feature side panel */
.hero-v2 .hero-inner{grid-template-columns:1fr 1fr}
.hero-v2 .hero-art{min-height:520px}
.hero-v2 .feature-stack{position:absolute;bottom:-30px;right:0;display:flex;flex-direction:column;gap:10px;z-index:4}
.hero-v2 .feature-stack .row{
  background:#fff;border:1px solid var(--hairline);border-radius:14px;padding:10px 14px;
  display:flex;align-items:center;gap:12px;font-family:var(--sans);font-size:13px;
  box-shadow:var(--shadow-card);min-width:240px;
}
.hero-v2 .feature-stack .row .ck{color:var(--green);font-weight:700}

/* Hero variant 3: minimal centered */
.hero-v3 .hero-inner{grid-template-columns:1fr;text-align:center;padding:60px 0 80px}
.hero-v3 h1{font-size:88px}
.hero-v3 .hero-art{min-height:auto;margin-top:28px}
.hero-v3 .hero-mascot{width:240px}
.hero-v3 .hero-blob::before{width:340px;height:340px}
.hero-v3 .cta{justify-content:center}
.hero-v3 .meta{justify-content:center}
.hero-v3 .lede{margin-left:auto;margin-right:auto}

/* ------- Marquee ------- */
.marquee{
  background:var(--ink);color:#fff;padding:18px 0;overflow:hidden;
  font-family:var(--sans);font-weight:600;font-size:14px;letter-spacing:.06em;text-transform:uppercase;
}
.marquee .track{display:flex;gap:48px;animation:scroll 28s linear infinite;white-space:nowrap}
.marquee .track span{display:inline-flex;align-items:center;gap:14px;color:#FFE9A6}
.marquee .track .sep{color:var(--y-accent)}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ------- Features ------- */
.features-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:48px}
.feature-card{
  background:#fff;border:1px solid var(--hairline);border-radius:var(--radius-card);
  padding:28px;transition:transform .2s ease, box-shadow .2s ease;
  display:flex;flex-direction:column;gap:14px;
}
.feature-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-soft)}
.feature-card .ic{
  width:54px;height:54px;border-radius:14px;background:var(--w-mochi);
  display:flex;align-items:center;justify-content:center;color:var(--y-accent);
  border:1px solid #FFE9A6;
}
.feature-card h3{font-size:20px;font-weight:700}
.feature-card p{color:var(--muted);font-size:15px}
.feature-card .tag{display:inline-block;font-family:var(--sans);font-size:11px;font-weight:600;color:var(--y-accent);background:#FFF1D1;padding:3px 10px;border-radius:999px;align-self:flex-start}

.feature-card.big{grid-column:span 2;display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:0;overflow:hidden}
.feature-card.big .copy{padding:36px}
.feature-card.big .visual{
  background:linear-gradient(160deg, #FFE9A6, var(--y-main));
  height:100%;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.feature-card.big .visual img{width:65%;filter:drop-shadow(0 18px 30px rgba(80,55,10,.18))}

/* ------- Specs ------- */
.specs{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:48px}
.spec-card{
  background:#fff;border:1px solid var(--hairline);border-radius:var(--radius-card);
  padding:32px;
}
.spec-card .head{display:flex;align-items:center;gap:14px;padding-bottom:18px;border-bottom:1px dashed var(--hairline);margin-bottom:18px}
.spec-card .os-icon{
  width:48px;height:48px;border-radius:14px;background:var(--w-mochi);
  display:flex;align-items:center;justify-content:center;color:var(--ink);
  border:1px solid var(--hairline);
}
.spec-card h3{font-size:22px}
.spec-card .ver{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:2px}
.spec-list{display:grid;gap:10px}
.spec-list .row{display:grid;grid-template-columns:130px 1fr;gap:12px;font-size:14px}
.spec-list .row dt{color:var(--muted);font-family:var(--sans);font-weight:500}
.spec-list .row dd{color:var(--ink)}
.spec-card .dl{margin-top:22px;display:flex;gap:10px;flex-wrap:wrap}

/* ------- Download big ------- */
.download-hero{
  margin-top:48px;background:var(--ink);color:#fff;border-radius:28px;padding:48px;
  display:grid;grid-template-columns:1.1fr .9fr;gap:40px;align-items:center;position:relative;overflow:hidden;
}
.download-hero::before{
  content:"";position:absolute;width:300px;height:300px;border-radius:50%;
  background:radial-gradient(closest-side,var(--y-main),transparent 70%);
  top:-100px;right:-60px;opacity:.6;
}
.download-hero h3{color:#fff;font-size:32px}
.download-hero p{color:rgba(255,255,255,.7);margin-top:10px;max-width:420px}
.download-hero .options{display:grid;gap:10px}
.dl-row{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
  border-radius:16px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:16px;
  transition:background .15s ease;
}
.dl-row:hover{background:rgba(255,255,255,.1)}
.dl-row .left{display:flex;align-items:center;gap:14px}
.dl-row .os{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;color:#fff}
.dl-row .name{font-family:var(--sans);font-weight:600;font-size:15px}
.dl-row .file{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.dl-row .btn-primary{padding:10px 18px;font-size:13px}
.checksum{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.4);margin-top:14px}

/* ------- Guide ------- */
.guide-tabs{display:grid;grid-template-columns:280px 1fr;gap:32px;margin-top:48px}
.tab-list{display:flex;flex-direction:column;gap:6px}
.tab-list button{
  text-align:left;padding:14px 18px;border-radius:14px;font-family:var(--sans);font-size:15px;font-weight:500;
  color:var(--muted);border:1px solid transparent;display:flex;align-items:center;gap:14px;
}
.tab-list button .num{
  width:26px;height:26px;border-radius:50%;background:#fff;border:1px solid var(--hairline);
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:700;color:var(--muted);
}
.tab-list button.on{background:#fff;color:var(--ink);border-color:var(--hairline);box-shadow:var(--shadow-card)}
.tab-list button.on .num{background:var(--y-accent);color:#fff;border-color:var(--y-accent)}
.tab-panel{
  background:#fff;border:1px solid var(--hairline);border-radius:24px;
  padding:40px;display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:center;min-height:400px;
}
.tab-panel h3{font-size:26px;margin-bottom:12px}
.tab-panel p{color:var(--muted);font-size:15px}
.tab-panel ol{list-style:none;counter-reset:step;margin-top:18px;display:grid;gap:10px}
.tab-panel ol li{
  position:relative;padding:10px 14px 10px 44px;background:var(--w-mochi);border-radius:12px;
  font-size:14px;counter-increment:step;
}
.tab-panel ol li::before{
  content:counter(step);position:absolute;left:12px;top:50%;transform:translateY(-50%);
  width:22px;height:22px;border-radius:50%;background:var(--y-accent);color:#fff;
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;
}
.demo-stage{
  background:linear-gradient(160deg, var(--beige), var(--w-mochi));
  border-radius:18px;height:100%;min-height:320px;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;border:1px solid var(--hairline);
}

/* App mockup inside demo stage */
.app-mock{
  width:90%;background:#fff;border-radius:14px;border:1px solid var(--hairline);
  box-shadow:0 20px 40px -16px rgba(80,55,10,.22);overflow:hidden;
}
.app-mock .titlebar{
  display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--w-mochi);border-bottom:1px solid var(--hairline);
}
.app-mock .titlebar .dots{display:flex;gap:5px}
.app-mock .titlebar .dot{width:10px;height:10px;border-radius:50%;background:#E6DFCC}
.app-mock .titlebar .name{font-family:var(--sans);font-size:11px;color:var(--muted);font-weight:500}
.app-mock .body{padding:14px;display:grid;gap:8px}
.app-mock .toolbar{display:flex;gap:6px;padding:6px;background:var(--w-mochi);border-radius:8px}
.app-mock .toolbar .b{padding:5px 8px;background:#fff;border:1px solid var(--hairline);border-radius:6px;font-family:var(--sans);font-size:10px;color:var(--muted)}
.app-mock .toolbar .b.active{background:var(--y-accent);color:#fff;border-color:var(--y-accent)}
.app-mock .canvas{
  background:var(--beige);border-radius:8px;height:160px;
  display:flex;flex-wrap:wrap;gap:6px;padding:10px;align-content:flex-start;
}
.app-mock .page{
  width:46px;height:62px;background:#fff;border:1px solid var(--hairline);border-radius:3px;
  position:relative;
}
.app-mock .page::after{
  content:"";position:absolute;inset:6px;background:repeating-linear-gradient(transparent 0 3px, var(--hairline) 3px 4px);
}
.app-mock .page.sel{outline:2px solid var(--y-accent);outline-offset:2px}

/* ------- FAQ ------- */
.faq-list{margin-top:40px;display:grid;gap:10px;max-width:840px;margin-left:auto;margin-right:auto}
.faq-item{
  background:#fff;border:1px solid var(--hairline);border-radius:18px;overflow:hidden;
}
.faq-item summary{
  list-style:none;padding:22px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;cursor:pointer;
  font-weight:600;font-size:17px;
}
.faq-item summary::-webkit-details-marker{display:none}
.faq-item summary .q{display:flex;align-items:center;gap:14px}
.faq-item summary .q .qmark{
  font-family:var(--mono);width:30px;height:30px;border-radius:50%;background:var(--y-main);color:var(--ink);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;
}
.faq-item summary .chev{transition:transform .2s ease;color:var(--muted)}
.faq-item[open] summary .chev{transform:rotate(180deg)}
.faq-item .a{padding:0 24px 22px 68px;color:var(--muted);font-size:15px}

/* ------- Reviews ------- */
.review-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:40px}
.review{
  background:#fff;border:1px solid var(--hairline);border-radius:20px;padding:24px;
  display:flex;flex-direction:column;gap:14px;
}
.review .stars{color:var(--y-accent);font-family:var(--sans);letter-spacing:.1em}
.review .quote{font-size:15px;line-height:1.7}
.review .who{display:flex;align-items:center;gap:10px;margin-top:auto;padding-top:14px;border-top:1px dashed var(--hairline)}
.review .who .av{width:36px;height:36px;border-radius:50%;background:var(--y-main);color:var(--ink);display:flex;align-items:center;justify-content:center;font-family:var(--sans);font-weight:700;font-size:13px}
.review .who .name{font-family:var(--sans);font-size:13px;font-weight:600}
.review .who .role{font-family:var(--sans);font-size:11px;color:var(--muted)}

/* ------- Donate ------- */
.donate{
  margin-top:48px;background:linear-gradient(160deg,#FFE9A6 0%, var(--y-main) 100%);
  border-radius:28px;padding:48px;display:flex;align-items:center;gap:36px;position:relative;overflow:hidden;
}
.donate img{width:160px;flex-shrink:0;filter:drop-shadow(0 14px 24px rgba(80,55,10,.2))}
.donate h3{font-size:30px}
.donate p{color:rgba(42,38,32,.75);margin-top:8px;max-width:520px}
.donate .actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}

/* ------- Footer ------- */
.site-footer{
  background:var(--ink);color:rgba(255,255,255,.7);padding:64px 0 28px;margin-top:48px;
}
.site-footer .grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:40px}
.site-footer h4{color:#fff;font-size:14px;font-family:var(--sans);font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:14px}
.site-footer ul{list-style:none;display:grid;gap:10px;font-family:var(--sans);font-size:14px}
.site-footer .brand{color:#fff;font-size:22px}
.site-footer .brand img{filter:brightness(1.1)}
.site-footer .desc{font-size:13px;line-height:1.7;margin-top:14px;font-family:var(--sans)}
.site-footer a:hover{color:var(--y-main)}
.site-footer .legal{margin-top:48px;padding-top:20px;border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;color:rgba(255,255,255,.4)}

/* small screens */
@media (max-width: 820px){
  .hero-inner, .hero-v2 .hero-inner{grid-template-columns:1fr}
  .hero h1{font-size:48px}
  .hero-v3 h1{font-size:54px}
  .features-grid, .specs, .review-grid{grid-template-columns:1fr}
  .feature-card.big{grid-template-columns:1fr}
  .download-hero{grid-template-columns:1fr;padding:32px}
  .donate{flex-direction:column;text-align:center;padding:32px}
  .guide-tabs{grid-template-columns:1fr}
  .tab-panel{grid-template-columns:1fr;padding:24px}
  .nav{display:none}
  .site-footer .grid{grid-template-columns:1fr 1fr}
}
</style>
