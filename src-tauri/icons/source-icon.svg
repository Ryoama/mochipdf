<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- 角丸正方形背景(もちホワイト) -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="#FFF7E6"/>

  <!-- 影 -->
  <ellipse cx="512" cy="860" rx="300" ry="28" fill="#F0E4D0" opacity="0.7"/>

  <!-- もち本体 -->
  <path d="M 512,120
    C 720,120 880,280 880,500
    C 900,700 740,860 520,860
    C 300,870 140,720 150,500
    C 150,280 300,120 512,120 Z"
    fill="#FFFFFF" stroke="#F6EFE3" stroke-width="8"/>

  <!-- 目 -->
  <ellipse cx="380" cy="440" rx="26" ry="34" fill="#333333"/>
  <ellipse cx="600" cy="440" rx="26" ry="34" fill="#333333"/>
  <!-- 目のハイライト -->
  <circle cx="388" cy="428" r="9" fill="#FFFFFF"/>
  <circle cx="608" cy="428" r="9" fill="#FFFFFF"/>

  <!-- 口 -->
  <path d="M 430,560 Q 490,620 550,560" stroke="#333333" stroke-width="18"
    fill="none" stroke-linecap="round"/>

  <!-- ほっぺ -->
  <ellipse cx="270" cy="540" rx="50" ry="28" fill="#FFB5B5" opacity="0.75"/>
  <ellipse cx="700" cy="540" rx="50" ry="28" fill="#FFB5B5" opacity="0.75"/>

  <!-- PDFドキュメント -->
  <g transform="translate(640, 580) rotate(12)">
    <rect width="250" height="280" rx="28" fill="#FFD766" stroke="#E6B848" stroke-width="4"/>
    <circle cx="68" cy="90" r="16" fill="#FFFFFF"/>
    <circle cx="182" cy="90" r="16" fill="#FFFFFF"/>
    <circle cx="68" cy="190" r="16" fill="#FFFFFF"/>
    <circle cx="182" cy="190" r="16" fill="#FFFFFF"/>
  </g>

  <!-- キラッ(右上) -->
  <g transform="translate(860, 180)" fill="#FFB800">
    <path d="M 0,-40 L 10,-10 L 40,0 L 10,10 L 0,40 L -10,10 L -40,0 L -10,-10 Z"/>
  </g>
  <!-- 小さいキラッ -->
  <circle cx="915" cy="120" r="10" fill="#FFD766"/>
  <circle cx="800" cy="100" r="6" fill="#FFB800"/>
</svg>
